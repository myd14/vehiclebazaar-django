{% extends 'base.html' %}

{% block title %}Contact Seller - VehicleBazaar{% endblock %}

{% block content %}
<h2 class="mb-4">Contact Seller</h2>

<div class="card p-4 shadow-sm">
    <p><strong>Listing:</strong> {{ car.title }}</p>
    <p><strong>Seller:</strong> {{ car.owner.username }}</p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Subject</label>
            {{ form.subject }}
        </div>
        <div class="mb-3">
            <label class="form-label">Message</label>
            {{ form.content }}
        </div>
        <button type="submit" class="btn btn-dark">Send</button>
        <a href="{% url 'car_detail' car.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
